name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: src/frontend/.bun-version
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  backend:
    name: Backend (build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore src/backend/Web10.Radio.sln
      - run: dotnet build src/backend/Web10.Radio.sln -c Release --no-restore
      # Testcontainers uses the Docker daemon preinstalled on ubuntu-latest to spin up postgres:17.
      - run: dotnet test src/backend/Web10.Radio.sln -c Release --no-build

  build-and-push:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')))
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: deploy/Dockerfile.api
            context: .
          - name: telegram
            dockerfile: src/backend/Dockerfile.telegram
            context: src/backend
          - name: migrator
            dockerfile: src/backend/Dockerfile.migrator
            context: src/backend
          - name: stream-node
            dockerfile: src/stream-node/Dockerfile
            context: src/stream-node
          - name: xray-proxy
            dockerfile: deploy/Dockerfile.xray
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/keroosha/better-web10-radio/${{ matrix.image.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
