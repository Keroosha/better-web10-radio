# Web10.Radio — production topology (pulls published GHCR images; does NOT build).
#
# This file defines the prod service graph. Actual server provisioning (TLS ingress,
# secrets store, managed Postgres, backups) is a separate, deferred step. To use:
#
#   cp .env.prod.example .env.prod   # fill in real secrets (gitignored)
#   COMPOSE_PROJECT_NAME=web10-radio-prod docker compose -p "$COMPOSE_PROJECT_NAME" -f compose.prod.yaml --env-file .env.prod up -d --wait
#
# WEB10_IMAGE_TAG must be an immutable sha-<short-commit>; latest is not supported.
#
# Differences from the dev compose.yaml:
#   • no nginx `frontend` — the all-in-one `api` image serves both SPAs + /api/v0/*
#   • no `rtmp-sink` / `storage-init` / seaweedfs (dev/smoke only)
#   • `telegram` is disabled by default and runs LongPolling only when the `telegram` profile is enabled
#   • `stream-node` loads the stage from the API and streams to the real RTMP target

x-web10-logging: &web10-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  postgres:
    image: postgres:17
    logging: *web10-logging
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-web10}"
      POSTGRES_USER: "${POSTGRES_USER:-web10}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod}"
    volumes:
      - web10-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-web10} -d $${POSTGRES_DB:-web10}"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  migrator:
    image: "ghcr.io/keroosha/better-web10-radio/migrator:${WEB10_IMAGE_TAG:?WEB10_IMAGE_TAG is required in prod}"
    logging: *web10-logging
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env.prod
        required: true
    restart: "no"

  api:
    image: "ghcr.io/keroosha/better-web10-radio/api:${WEB10_IMAGE_TAG:?WEB10_IMAGE_TAG is required in prod}"
    logging: *web10-logging
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      # The single public origin: public stage at '/', admin at '/admin/', API at '/api/v0/'.
      - "${WEB10_API_PUBLISH_ADDRESS:-127.0.0.1}:8080:8080"
    env_file:
      - path: .env.prod
        required: true
    volumes:
      - ./.storage:/var/lib/web10/storage
      - web10-storage-cache:/var/lib/web10/cache
      - web10-data-protection:/var/lib/web10/data-protection
    healthcheck:
      test: ["CMD", "dotnet", "Web10.Radio.API.dll", "--health-check", "http://127.0.0.1:8080/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  telegram:
    image: "ghcr.io/keroosha/better-web10-radio/telegram:${WEB10_IMAGE_TAG:?WEB10_IMAGE_TAG is required in prod}"
    logging: *web10-logging
    profiles: [telegram]
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    env_file:
      - path: .env.prod
        required: true
    healthcheck:
      test: ["CMD", "dotnet", "Web10.Radio.Telegram.dll", "--health-check", "http://127.0.0.1:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  stream-node:
    image: "ghcr.io/keroosha/better-web10-radio/stream-node:${WEB10_IMAGE_TAG:?WEB10_IMAGE_TAG is required in prod}"
    logging: *web10-logging
    cpus: 8.0
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - path: .env.prod
        required: true
    healthcheck:
      test: ["CMD", "./Web10.Radio.StreamNode", "--health-check", "http://127.0.0.1:18080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

volumes:
  web10-postgres-data:
  web10-storage-cache:
  web10-data-protection:
