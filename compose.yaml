services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: web10
      POSTGRES_USER: web10
      POSTGRES_PASSWORD: web10
    ports:
      - "5432:5432"
    volumes:
      - web10-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web10 -d web10"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  migrator:
    image: web10-radio-migrator:local
    build:
      context: ./src/backend
      dockerfile: Dockerfile.migrator
    depends_on:
      postgres:
        condition: service_healthy
    # Committed defaults from .defaults.env; a local .env (gitignored) overrides.
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    restart: "no"

  # The API runs as chiseled non-root UID 1654 and write-probes LOCAL_ROOT at startup. A
  # bind-mounted host folder is owned by the host user, so 1654 can't write and startup fails.
  # This root init container makes the mount readable+traversable and its root writable for 1654
  # before the API boots (SPEC §9 compose order: … → storage-init → API). It does NOT chown, so
  # your audio files keep their host ownership.
  storage-init:
    image: web10-radio-stream-node:local
    build:
      context: ./src/stream-node
      dockerfile: Dockerfile
    depends_on:
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./.storage:/var/lib/web10/storage
    # Keep this as a one-shot initializer: create the absent smoke track, then apply existing permissions.
    command: ["sh", "-ec", "track=/var/lib/web10/storage/web10-compose-smoke.wav; if [ ! -e \"$$track\" ] && [ ! -L \"$$track\" ]; then python3 ./scripts/create-smoke-track.py --path \"$$track\" --duration-seconds 120 --sample-rate 48000; fi; chmod -R a+rX /var/lib/web10/storage && chmod a+rwx /var/lib/web10/storage"]
    restart: "no"

  api:
    image: web10-radio-api:local
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    # All app config lives in .defaults.env (committed working defaults). Create a local .env
    # (gitignored) to override secrets — see the SECRETS block in .defaults.env.
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    volumes:
      - ./.storage:/var/lib/web10/storage
      - web10-data-protection:/var/lib/web10/data-protection
    healthcheck:
      test: ["CMD", "dotnet", "Web10.Radio.API.dll", "--health-check", "http://127.0.0.1:8080/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  rtmp-sink:
    image: web10-radio-rtmp-sink:local
    build:
      context: ./src/stream-node/smoke/rtmp-sink
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8091:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  frontend:
    image: web10-radio-frontend:local
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Public stage at http://localhost:8090/ ; admin cabinet at http://localhost:8090/admin/
      - "8090:80"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1/"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  stream-node:
    image: web10-radio-stream-node:local
    build:
      context: ./src/stream-node
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      rtmp-sink:
        condition: service_healthy
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    volumes:
      - ./.storage:/var/lib/web10/storage:ro
    healthcheck:
      test: ["CMD", "python3", "./scripts/supervisor.py", "health-check"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

volumes:
  web10-postgres-data:
  web10-data-protection:
