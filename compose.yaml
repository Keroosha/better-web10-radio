services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-web10}"
      POSTGRES_USER: "${POSTGRES_USER:-web10}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-web10}"
    ports:
      - "5432:5432"
    volumes:
      - web10-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-web10} -d $${POSTGRES_DB:-web10}"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  migrator:
    image: web10-radio-migrator:local
    build:
      context: ./src/backend
      dockerfile: Dockerfile.migrator
    depends_on:
      postgres:
        condition: service_healthy
    # Committed defaults from .defaults.env; a local .env (gitignored) overrides.
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    restart: "no"

  # The API and stream node run as non-root UID 1654. Keep source media in the
  # host-backed storage mount, while materialized audio/artwork uses this named
  # volume so the chiseled API can write without changing host file ownership.
  storage-init:
    image: web10-radio-stream-node:local
    user: "0:0"
    build:
      context: ./src/stream-node
      dockerfile: Dockerfile
    depends_on:
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./.storage:/var/lib/web10/storage
      - web10-storage-cache:/var/lib/web10/cache
    command:
      - sh
      - -ec
      - |
        install -d -o 1654 -g 1654 -m 0775 /var/lib/web10/cache /var/lib/web10/cache/audio /var/lib/web10/cache/covers /var/lib/web10/cache/tmp
        track=/var/lib/web10/storage/web10-compose-tagged.mp3
        if [ ! -e "$$track" ] && [ ! -L "$$track" ]; then
          tmp="$${track}.tmp.mp3"
          ffmpeg -hide_banner -loglevel error \
            -f lavfi -i "anullsrc=r=48000:cl=stereo" \
            -f lavfi -i "color=c=black:s=16x16:r=1:d=1" \
            -map 0:a:0 -map 1:v:0 -t 120 \
            -c:a libmp3lame -ar 48000 -ac 2 -b:a 128k \
            -c:v mjpeg -disposition:v attached_pic \
            -metadata title="Web10 Compose Smoke" \
            -metadata artist="Web10.Radio" \
            -metadata album="Compose" \
            -y "$$tmp"
          mv -f "$$tmp" "$$track"
        fi
        chmod -R a+rX /var/lib/web10/storage
        chmod a+rwx /var/lib/web10/storage
        if command -v setpriv >/dev/null 2>&1; then
          setpriv --reuid=1654 --regid=1654 --clear-groups sh -c 'touch /var/lib/web10/cache/tmp/.storage-init-write-probe && rm -f /var/lib/web10/cache/tmp/.storage-init-write-probe'
        else
          if ! grep -q ':1654:' /etc/group; then
            printf '%s\n' 'web10uid1654:x:1654:' >> /etc/group
          fi
          if ! grep -q ':1654:' /etc/passwd; then
            printf '%s\n' 'web10uid1654:x:1654:1654::/nonexistent:/bin/sh' >> /etc/passwd
          fi
          su -s /bin/sh -c 'touch /var/lib/web10/cache/tmp/.storage-init-write-probe && rm -f /var/lib/web10/cache/tmp/.storage-init-write-probe' web10uid1654
        fi
    restart: "no"

  api:
    image: web10-radio-api:local
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    # All app config lives in .defaults.env; a local .env (gitignored) overrides it.
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    volumes:
      - ./.storage:/var/lib/web10/storage
      - web10-storage-cache:/var/lib/web10/cache
      - web10-data-protection:/var/lib/web10/data-protection
    healthcheck:
      test: ["CMD", "dotnet", "Web10.Radio.API.dll", "--health-check", "http://127.0.0.1:8080/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  telegram:
    image: web10-radio-telegram:local
    build:
      context: ./src/backend
      dockerfile: Dockerfile.telegram
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    # Committed defaults from .defaults.env; a local .env (gitignored) overrides.
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "dotnet", "Web10.Radio.Telegram.dll", "--health-check", "http://127.0.0.1:8080/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  rtmp-sink:
    image: web10-radio-rtmp-sink:local
    build:
      context: ./src/stream-node/smoke/rtmp-sink
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8091:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  frontend:
    image: web10-radio-frontend:local
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
      telegram:
        condition: service_healthy
    ports:
      # Public stage at http://localhost:8090/ ; admin cabinet at http://localhost:8090/admin/
      - "8090:80"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1/"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  stream-node:
    image: web10-radio-stream-node:local
    build:
      context: ./src/stream-node
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      rtmp-sink:
        condition: service_healthy
    # Committed defaults from .defaults.env; a local .env (gitignored) overrides.
    env_file:
      - path: .defaults.env
        required: true
      - path: .env
        required: false
    volumes:
      - ./.storage:/var/lib/web10/storage:ro
      - web10-storage-cache:/var/lib/web10/cache:ro
    healthcheck:
      test: ["CMD", "./Web10.Radio.StreamNode", "--health-check", "http://127.0.0.1:18080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

volumes:
  web10-postgres-data:
  web10-storage-cache:
  web10-data-protection:
