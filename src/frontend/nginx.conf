server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Admin uploads (e.g. social-link QR images) travel as base64 data URLs inside the
    # JSON body, which inflates ~1.37x. nginx defaults to 1m and 413s the request before
    # it reaches the API; allow room for the 1 MB client-side image cap plus that overhead.
    client_max_body_size 8m;

    # Behind Docker port mapping (host 8090 -> container 80) the directory trailing-slash
    # redirect must be relative, or nginx sends Location: http://localhost:80/... and drops
    # the external port. Relative redirects let the browser keep localhost:8090.
    absolute_redirect off;

    # Proxy the F# backend. proxy_pass has no path, so the full /api/... URI is forwarded.
    # SSE (/api/v0/player/events) needs buffering off and a long read timeout to stream deltas.
    # Telegram owns the public webhook and health paths. Keep this more-specific
    # location before the generic API proxy so nginx does not send those requests to API.
    location /api/v0/telegram/ {
        proxy_pass http://telegram:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://api:8080;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Admin SPA (built with base=/admin/): fall back to its own index.html.
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Public stage SPA: fall back to the root index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
