user www-data;
worker_processes 1;
pid /run/nginx.pid;
error_log /dev/stderr warn;

include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application s {
            live on;
            record off;
        }
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    server {
        listen 8080;
        server_name _;

        location = /healthz {
            access_log off;
            return 204;
        }

        location = /stat {
            rtmp_stat all;
        }
    }
}
